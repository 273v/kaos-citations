name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── lint ──────────────
  # Separate from tests so format / lint / type failures fail-fast and
  # are easy to spot without combing through test output.
  lint:
    name: Lint
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --python 3.13

      - name: Ruff format check
        run: uv run ruff format --check kaos_citations tests

      - name: Ruff lint
        run: uv run ruff check kaos_citations tests

      - name: Type check (ty)
        run: uv run ty check kaos_citations tests

  # ────────────── pre-commit ──────────────
  # Catches any drift between the local pre-commit config and the
  # checks above. If a contributor disabled their local hooks, this
  # job still enforces the contract on the PR.
  pre-commit:
    name: Pre-commit hooks
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (needed by the local ty hook)
        run: uv sync --group dev --python 3.13

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  # ────────────── test ──────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: kaos-x64-16core
    # Stable matrix entries gate PRs; experimental entries
    # (3.14t free-threaded, 3.15-dev pre-release) are informational
    # only — the matrix `experimental: true` flag flips
    # `continue-on-error` so CI is not blocked by upstream churn we
    # cannot fix.
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.13"
            experimental: false
          - python-version: "3.14"
            experimental: false
          # Free-threaded build (PEP 703). Available since 3.14 GA.
          # We don't yet ship `Py_GIL_DISABLED` extensions, but we want
          # early signal that pure-Python imports + tests still work
          # without the GIL.
          - python-version: "3.14t"
            experimental: true
          # Pre-release of 3.15 (expected GA October 2026). Catches
          # ecosystem incompatibilities (deferred annotations, removed
          # APIs) before consumers hit them.
          - python-version: "3.15"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python ${{ matrix.python-version }}
        # `--preview` lets `uv python install` resolve in-development
        # interpreters (3.15) and the free-threaded variant (3.14t).
        # No-op for stable versions.
        run: uv python install --preview ${{ matrix.python-version }}

      - name: Install lxml build deps (3.15 has no prebuilt wheels yet)
        # eyecite (dev group) transitively depends on lxml 6.x, which
        # publishes wheels for 3.13/3.14 but not yet for 3.15-alpha. uv
        # falls through to a source build that needs the libxml2 +
        # libxslt development headers. Cheap apt step so the
        # experimental 3.15 matrix entry compiles instead of erroring on
        # the build backend. No-op for stable versions because they get
        # the prebuilt wheel.
        if: matrix.python-version == '3.15'
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libxml2-dev libxslt1-dev

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: |
          uv run pytest \
            -m "not live and not network and not slow and not integration" \
            --cov=kaos_citations \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always() && !matrix.experimental
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ────────────── min-deps ──────────────
  # Resolve and test against the minimum declared versions of every
  # dependency so we catch "we said >=X but actually need X+1" drift.
  # Runs on 3.13 only; 3.14 is the cutting edge and may not have wheels
  # for very old dep versions.
  min-deps:
    name: Test against minimum dependencies
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install with lowest-direct resolution
        run: uv sync --group dev --resolution=lowest-direct --python 3.13

      - name: Run tests
        run: |
          uv run pytest \
            -m "not live and not network and not slow and not integration" \
            --no-cov \
            -q

  # ────────────── build + wheel smoke test ──────────────
  build:
    name: Build distribution + smoke test
    runs-on: kaos-x64-16core
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel + sdist
        run: uv build

      - name: Verify metadata (twine check)
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        # Install the actually-built wheel (not the source tree) into a
        # clean Python environment and exercise the public API. This
        # catches packaging bugs that source-tree tests miss: missing
        # data files, broken `__init__.py` exports, sdist-only files
        # that reference dist-only paths, etc.
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_citations-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_citations
          assert kaos_citations.__version__, 'version missing from wheel'
          # Public API surface that the wheel must expose.
          from kaos_citations import (
              CFRCitation,
              CaseCitation,
              Citation,
              CitationParseError,
              ConstitutionCitation,
              DOICitation,
              FederalRegisterCitation,
              IFRSCitation,
              KaosCitationsError,
              KaosCitationsSettings,
              SECFilingCitation,
              StatuteCitation,
              apply_postprocess,
              assign_cite_ids,
              extract_citations,
              register_citations_resources,
              register_citations_tools,
          )
          from kaos_citations.resources import CITATION_KINDS_URI, CitationKindsResource
          # 1) Bulk extract — case + cfr + statute + const should all fire.
          text = (
              'See Brown v. Bd. of Educ., 347 U.S. 483 (1954); '
              '17 CFR 240.10b-5; 42 U.S.C. § 1983; U.S. Const. amend. I.'
          )
          cites = extract_citations(text)
          kinds = sorted({c.kind for c in cites})
          assert {'case', 'cfr', 'statute', 'const'}.issubset(set(kinds)), kinds
          # 2) Stable cite_id assignment.
          assert all(c.cite_id.startswith('c') for c in cites)
          # 3) Bluebook paren-chain: year goes to year, not to parenthetical.
          one = extract_citations('Brown v. Bd. of Educ., 347 U.S. 483 (1954).')
          assert len(one) == 1
          assert one[0].year == 1954 and one[0].parenthetical is None
          # 4) Kinds resource resolves to the documented 60-kind taxonomy.
          import asyncio
          data = asyncio.run(CitationKindsResource().read())
          assert data['count'] == 60, data['count']
          assert data['opt_in_kinds'] == ['arxiv']
          print(
              f'kaos-citations {kaos_citations.__version__}: '
              f'bulk extract green, cite_ids assigned, paren-chain correct, '
              f\"resource serves {data['count']} kinds\"
          )
          "
          # Exercise the MCP server entry point (--help only; no stdio).
          /tmp/smoke/bin/kaos-citations-serve --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
