name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 02:00 UTC — re-scan in case a new CVE landed against
    # an existing pinned dependency.
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── gitleaks (CLI, license-free) ──────────────
  # `gitleaks/gitleaks-action@v2` requires a paid license for
  # organization-owned repositories as of late 2025. The gitleaks CLI
  # itself is MIT-licensed and free; we run it directly via the
  # official Docker image so there is no license, no rate limit, and
  # no third-party action in our supply chain for this scan.
  #
  # Rule scope: the default open-source ruleset, plus any project-local
  # overrides in `.gitleaks.toml` and `.gitleaksignore`.
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks (Docker, no license required)
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo \
            zricethezav/gitleaks:latest detect \
            --source /repo \
            --redact \
            --no-banner \
            --verbose \
            --exit-code 1

  # ────────────── pip-audit ──────────────
  # Scan the locked dependency set for known CVEs. PyPA-maintained
  # tooling that consults the Python Packaging Advisory Database (PyPA)
  # plus OSV.
  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # The pip-audit action creates its own subprocess venv that uses
      # whatever Python is on PATH. Several kaos-citations runtime / dev
      # dependencies (kaos-core / kaos-content / kaos-nlp-core) declare
      # ``requires-python >=3.13``. Without 3.13 on the runner pip would
      # report "no matching distribution" on the alpha versions and
      # fail the audit before scanning. ``setup-python`` puts 3.13 on
      # PATH for everyone downstream.
      - name: Set up Python 3.13 (for pip-audit subprocess venv)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Sync dependencies
        run: uv sync --group dev --python 3.13

      - name: Export installed dependency set to requirements.txt
        # pip-audit reads requirements.txt; uv export gives us the
        # exact resolved set, including transitive dependencies.
        run: uv export --no-hashes --no-emit-project --format requirements-txt > /tmp/requirements.txt

      - name: Run pip-audit
        # `--strict` makes the action fail on any vulnerability, even
        # warnings. We can switch to `--no-strict` and rely on the
        # GitHub annotation for advisory mode if this turns out to be
        # too noisy in practice.
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: /tmp/requirements.txt

  # ────────────── bandit (AST-level static security) ──────────────
  # AST-level scan for common Python security antipatterns. Mirrors
  # the pre-commit hook so the public PR signal matches what ran
  # locally. Skip list justified per audit:
  #   B101 — pytest `assert`s; framework usage, not a security claim.
  #   B404 — `import subprocess`; intentional (sandbox + tool
  #          integrations).
  #   B603 — subprocess without `shell=True`; correct (the safer
  #          default we deliberately pick).
  #   B607 — partial-path subprocess; only used for known-safe
  #          binaries (`python`, `git`).
  bandit:
    name: bandit (static security)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: security-bandit-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Run bandit
        run: |
          uvx --python 3.13 bandit \
            --recursive \
            --skip B101,B404,B603,B607 \
            --severity-level medium \
            --confidence-level medium \
            kaos_citations


  # ────────────── vulture (dead-code detection) ──────────────
  # Reports names vulture is 100% confident are unreachable. The
  # `--ignore-names` list carves out names vulture can't infer from
  # the import graph (framework callbacks, signal handlers, OAuth /
  # OIDC field names accessed by string, MCP `_meta` keys, etc.).
  # Mirrors the pre-commit hook.
  vulture:
    name: vulture (dead-code scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Run vulture
        run: |
          uvx --python 3.13 vulture \
            kaos_citations \
            --min-confidence 100 \
            --ignore-names client_id,scopes,authorization_endpoint,token_endpoint,device_authorization_endpoint,url,open_ch,container_tag,message_id,parent_message_id,kwargs,context_id,frame,signum,exc_type,tb
